<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Air Superiority - Fixed</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050a10;
      --fg: #e8edf5;
      --muted: #4a5568;
      --accent: #00f5d4;
      --danger: #ff4757;
      --warning: #ffa502;
      --card: rgba(10, 20, 30, 0.85);
      --border: rgba(0, 245, 212, 0.3);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Share Tech Mono', monospace;
      background: var(--bg);
      color: var(--fg);
      overflow: hidden; /* Prevents scrollbars */
      height: 100vh;
      width: 100vw;
      cursor: crosshair;
    }

    .font-display { font-family: 'Orbitron', sans-serif; }

    #gameCanvas {
      display: block;
      position: absolute;
      top: 0;
      left: 0;
    }

    .hud {
      position: absolute;
      pointer-events: none;
      z-index: 10;
    }

    .hud-panel {
      background: var(--card);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      padding: 12px 16px;
      border-radius: 4px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
      border-left: 3px solid var(--accent);
    }

    .stat-value {
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      color: var(--accent);
      text-shadow: 0 0 10px rgba(0, 245, 212, 0.5);
    }

    .health-bar {
      width: 200px;
      height: 8px;
      background: rgba(255,255,255,0.1);
      border-radius: 4px;
      overflow: hidden;
      margin-top: 4px;
    }

    .health-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--danger), var(--warning), var(--accent));
      transition: width 0.2s;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(5, 10, 16, 0.98);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.3s;
    }

    .overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .modal {
      text-align: center;
      padding: 40px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      max-width: 500px;
    }

    .btn {
      font-family: 'Orbitron', sans-serif;
      background: transparent;
      color: var(--accent);
      border: 2px solid var(--accent);
      padding: 12px 30px;
      font-weight: 700;
      cursor: pointer;
      pointer-events: auto;
      transition: all 0.2s;
      text-transform: uppercase;
    }

    .btn:hover {
      background: var(--accent);
      color: var(--bg);
      box-shadow: 0 0 20px var(--accent);
    }

    .control-row {
      display: flex;
      justify-content: space-between;
      margin: 8px 0;
      padding: 8px;
      background: rgba(255,255,255,0.05);
      border-radius: 4px;
      text-align: left;
    }
    
    .key-badge {
      background: rgba(0, 245, 212, 0.2);
      padding: 2px 8px;
      border-radius: 4px;
      font-family: 'Orbitron', sans-serif;
      font-size: 12px;
      margin-left: 5px;
    }

    .alert-banner {
      position: fixed;
      top: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 71, 87, 0.2);
      border: 1px solid var(--danger);
      padding: 8px 24px;
      border-radius: 4px;
      font-family: 'Orbitron', sans-serif;
      color: var(--danger);
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
      z-index: 20;
    }

    .alert-banner.active { opacity: 1; }

    .thrust-indicator {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      pointer-events: none;
      z-index: 15;
      opacity: 0.6;
    }
    .key-box {
      width: 40px;
      height: 40px;
      border: 1px solid var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      font-family: 'Orbitron';
      font-size: 12px;
      background: rgba(0,0,0,0.5);
      transition: all 0.1s;
    }
    .key-box.active {
      background: var(--accent);
      color: var(--bg);
      transform: scale(0.95);
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>

  <!-- Missile Alert Banner -->
  <div class="alert-banner" id="alertBanner">MISSILE LOCK DETECTED</div>

  <!-- Top HUD -->
  <div class="hud top-4 left-4 right-4 flex justify-between items-start">
    <div class="hud-panel">
      <div class="text-xs text-gray-400 uppercase tracking-widest">Hull Integrity</div>
      <div class="health-bar">
        <div class="health-fill" id="healthBar" style="width: 100%"></div>
      </div>
      <div class="flex justify-between mt-2 text-xs">
        <span>ARMOR</span>
        <span class="stat-value" id="healthText">100%</span>
      </div>
    </div>

    <div class="hud-panel text-center">
      <div class="text-xs text-gray-400 uppercase tracking-widest">Score</div>
      <div class="stat-value text-3xl" id="scoreDisplay">0</div>
    </div>

    <div class="hud-panel text-right">
      <div class="flex gap-6">
        <div>
          <div class="text-xs text-gray-400 uppercase">AGM</div>
          <div class="stat-value text-xl">INF</div>
        </div>
        <div>
          <div class="text-xs text-gray-400 uppercase">FLARE</div>
          <div class="stat-value text-xl" id="cmCount">10</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Radar -->
  <div class="hud bottom-4 left-4">
    <div class="hud-panel">
      <div class="text-xs text-gray-400 uppercase mb-2">Radar</div>
      <canvas id="minimapCanvas" width="150" height="150" style="border-radius: 50%; border: 1px solid var(--border);"></canvas>
    </div>
  </div>

  <!-- Visual Control Feedback -->
  <div class="thrust-indicator">
     <div class="key-box" id="keyA">A</div>
     <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px;">
        <div class="key-box" id="keyW">W</div>
        <div class="key-box" id="keyS">S</div>
     </div>
     <div class="key-box" id="keyD">D</div>
  </div>

  <!-- Start Screen -->
  <div class="overlay" id="startOverlay">
    <div class="modal">
      <h1 class="font-display text-4xl font-black text-white mb-2">AIR SUPERIORITY</h1>
      <p class="text-gray-400 mb-8">Fixed Flight Physics & Combat</p>
      
      <div class="text-left bg-black/30 p-4 rounded mb-8 text-sm">
        <div class="control-row">
          <span>Thrust / Brake</span>
          <span><span class="key-badge">W</span> / <span class="key-badge">S</span></span>
        </div>
        <div class="control-row">
          <span>Turn Left / Right</span>
          <span><span class="key-badge">A</span> / <span class="key-badge">D</span></span>
        </div>
        <div class="control-row">
          <span>Fire Missile (Auto-Lock)</span>
          <span><span class="key-badge">SPACE</span></span>
        </div>
        <div class="control-row">
          <span>Launch Flare</span>
          <span><span class="key-badge">E</span></span>
        </div>
      </div>

      <button class="btn" id="startBtn">Launch Mission</button>
    </div>
  </div>

  <!-- Game Over Screen -->
  <div class="overlay hidden" id="gameOverOverlay">
    <div class="modal">
      <h2 class="font-display text-3xl font-bold text-white mb-2">AIRCRAFT DESTROYED</h2>
      <p class="text-gray-400 mb-6">Mission Failed</p>
      <div class="mb-8">
        <div class="text-xs text-gray-400 uppercase">Final Score</div>
        <div class="stat-value text-4xl" id="finalScore">0</div>
      </div>
      <button class="btn" id="restartBtn">Retry Mission</button>
    </div>
  </div>

  <script>
    // --- INITIALIZATION ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const minimapCanvas = document.getElementById('minimapCanvas');
    const minimapCtx = minimapCanvas.getContext('2d');

    // DOM Elements
    const scoreDisplay = document.getElementById('scoreDisplay');
    const healthBar = document.getElementById('healthBar');
    const healthText = document.getElementById('healthText');
    const cmCountDisplay = document.getElementById('cmCount');
    const alertBanner = document.getElementById('alertBanner');
    const startOverlay = document.getElementById('startOverlay');
    const gameOverOverlay = document.getElementById('gameOverOverlay');
    const startBtn = document.getElementById('startBtn');
    const restartBtn = document.getElementById('restartBtn');
    
    // Visual feedback
    const keyIndicators = {
      w: document.getElementById('keyW'),
      a: document.getElementById('keyA'),
      s: document.getElementById('keyS'),
      d: document.getElementById('keyD')
    };

    // Constants
    const MAP_SIZE = 4000;
    
    // Game State
    let gameState = {
      running: false,
      score: 0,
      lastTime: 0,
      mouse: { x: 0, y: 0 },
      screenShake: 0
    };

    // Player State
    let player = {
      x: MAP_SIZE / 2,
      y: MAP_SIZE / 2,
      vx: 0, // Velocity X
      vy: 0, // Velocity Y
      angle: -Math.PI/2,
      speed: 0,
      health: 100,
      counterMeasures: 10,
      fireCooldown: 0,
      cmCooldown: 0,
      
      // Physics
      maxSpeed: 9,
      accel: 0.5,
      friction: 0.98,
      turnSpeed: 0.08
    };

    // Camera
    let camera = { x: 0, y: 0 };

    // Input State
    const keys = { w: false, a: false, s: false, d: false, space: false, e: false };

    // Entity Arrays
    let enemies = [];
    let playerMissiles = []; 
    let enemyMissiles = [];  
    let antiMissiles = [];   
    let particles = [];
    let explosions = [];
    let trails = [];

    /* -- LOGIC -- */

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    function spawnWave() {
      const count = 3 + Math.floor(gameState.score / 500);
      for (let i = 0; i < count; i++) {
        let x, y, valid;
        do {
          x = Math.random() * MAP_SIZE;
          y = Math.random() * MAP_SIZE;
          const dist = Math.hypot(x - player.x, y - player.y);
          valid = dist > 600;
        } while (!valid);
        enemies.push(createEnemy(x, y));
      }
    }

    function startGame() {
      gameState.running = true;
      gameState.score = 0;
      gameState.lastTime = performance.now();
      
      player.x = MAP_SIZE / 2;
      player.y = MAP_SIZE / 2;
      player.vx = 0;
      player.vy = 0;
      player.speed = 2;
      player.angle = -Math.PI/2;
      player.health = 100;
      player.counterMeasures = 10;
      
      enemies = [];
      playerMissiles = [];
      enemyMissiles = [];
      antiMissiles = [];
      trails = [];
      
      spawnWave();
      
      startOverlay.classList.add('hidden');
      gameOverOverlay.classList.add('hidden');
      updateHUD();
    }

    function gameOver() {
      gameState.running = false;
      document.getElementById('finalScore').textContent = gameState.score;
      gameOverOverlay.classList.remove('hidden');
    }

    function updateHUD() {
      scoreDisplay.textContent = gameState.score;
      healthBar.style.width = player.health + '%';
      healthText.textContent = player.health + '%';
      cmCountDisplay.textContent = player.counterMeasures;
      
      if (enemyMissiles.length > 0) {
        alertBanner.classList.add('active');
        alertBanner.textContent = enemyMissiles.length > 1 ? "MULTIPLE MISSILES INCOMING" : "MISSILE LOCK DETECTED";
      } else {
        alertBanner.classList.remove('active');
      }
    }

    /* -- UPDATE LOOPS -- */

    function updatePlayer(dt) {
      // Rotation
      if (keys.a) player.angle -= player.turnSpeed;
      if (keys.d) player.angle += player.turnSpeed;

      // Thrust
      if (keys.w) {
        player.vx += Math.cos(player.angle) * player.accel;
        player.vy += Math.sin(player.angle) * player.accel;
      }
      // Brake
      if (keys.s) {
        player.vx *= 0.95;
        player.vy *= 0.95;
      }

      // Apply Friction
      player.vx *= player.friction;
      player.vy *= player.friction;

      // Speed check
      const currentSpeed = Math.hypot(player.vx, player.vy);
      if (currentSpeed > player.maxSpeed) {
        player.vx = (player.vx / currentSpeed) * player.maxSpeed;
        player.vy = (player.vy / currentSpeed) * player.maxSpeed;
      }

      // Apply Movement
      player.x += player.vx;
      player.y += player.vy;
      player.speed = currentSpeed;

      // Bounds
      player.x = Math.max(20, Math.min(MAP_SIZE - 20, player.x));
      player.y = Math.max(20, Math.min(MAP_SIZE - 20, player.y));

      // Cooldowns
      if (player.fireCooldown > 0) player.fireCooldown -= dt;
      if (player.cmCooldown > 0) player.cmCooldown -= dt;

      // Firing Logic
      if (keys.space && player.fireCooldown <= 0) {
        fireAGM();
        player.fireCooldown = 0.3;
      }

      if (keys.e && player.cmCooldown <= 0 && player.counterMeasures > 0) {
        fireAntiMissile();
        player.cmCooldown = 0.5;
        player.counterMeasures--;
      }

      // Visuals
      updateKeyIndicators();
      
      // Engine Trail
      if (player.speed > 0.5) {
        trails.push({
          x: player.x - Math.cos(player.angle) * 22,
          y: player.y - Math.sin(player.angle) * 22,
          life: 1,
          color: keys.w ? '#ff4757' : '#ffa502'
        });
      }
    }

    function updateKeyIndicators() {
      if(keyIndicators.w) keyIndicators.w.classList.toggle('active', keys.w);
      if(keyIndicators.a) keyIndicators.a.classList.toggle('active', keys.a);
      if(keyIndicators.s) keyIndicators.s.classList.toggle('active', keys.s);
      if(keyIndicators.d) keyIndicators.d.classList.toggle('active', keys.d);
    }

    function fireAGM() {
      // Find closest target
      let closest = null;
      let minDist = 1000;
      
      enemies.forEach(en => {
        const d = Math.hypot(en.x - player.x, en.y - player.y);
        if (d < minDist) {
          minDist = d;
          closest = en;
        }
      });
      
      if (closest) {
        playerMissiles.push({
          x: player.x + Math.cos(player.angle) * 30,
          y: player.y + Math.sin(player.angle) * 30,
          target: closest,
          speed: 12,
          angle: player.angle,
          life: 200,
          trail: []
        });
      }
    }

    function fireAntiMissile() {
      let closest = null;
      let minDist = 600;
      
      enemyMissiles.forEach(m => {
        const d = Math.hypot(m.x - player.x, m.y - player.y);
        if (d < minDist) {
          minDist = d;
          closest = m;
        }
      });
      
      if (closest) {
        antiMissiles.push({
          x: player.x,
          y: player.y,
          target: closest,
          speed: 18,
          life: 100
        });
      }
    }

    function createEnemy(x, y) {
      return {
        x: x,
        y: y,
        health: 100,
        fireCooldown: Math.random() * 2 + 1,
        angle: 0,
        radius: 30
      };
    }

    function createEnemyMissile(targetX, targetY, startX, startY) {
      const angle = Math.atan2(targetY - startY, targetX - startX);
      return {
        x: startX,
        y: startY,
        vx: Math.cos(angle) * 7,
        vy: Math.sin(angle) * 7,
        life: 400,
        trail: []
      };
    }

    function updateEnemies(dt) {
      enemies.forEach(en => {
        en.angle = Math.atan2(player.y - en.y, player.x - en.x);
        en.fireCooldown -= dt;
        if (en.fireCooldown <= 0) {
          enemyMissiles.push(createEnemyMissile(player.x, player.y, en.x, en.y));
          en.fireCooldown = 3 + Math.random() * 2;
        }
      });
    }

    function updateProjectiles(dt) {
      // Player Missiles
      for (let i = playerMissiles.length - 1; i >= 0; i--) {
        const m = playerMissiles[i];
        
        if (m.target && enemies.includes(m.target)) {
          const targetAngle = Math.atan2(m.target.y - m.y, m.target.x - m.x);
          let diff = targetAngle - m.angle;
          while (diff > Math.PI) diff -= 2 * Math.PI;
          while (diff < -Math.PI) diff += 2 * Math.PI;
          m.angle += diff * 0.15; 
        }
        
        m.x += Math.cos(m.angle) * m.speed;
        m.y += Math.sin(m.angle) * m.speed;
        m.life--;

        m.trail.push({ x: m.x, y: m.y, life: 10 });
        m.trail = m.trail.filter(t => { t.life--; return t.life > 0; });

        // Collision with Enemy
        if (m.target && Math.hypot(m.x - m.target.x, m.y - m.target.y) < 30) {
          createExplosion(m.target.x, m.target.y, '#00f5d4', true);
          enemies = enemies.filter(e => e !== m.target); // Wipe from map
          gameState.score += 100;
          playerMissiles.splice(i, 1);
          continue;
        }
        
        if (m.life <= 0) playerMissiles.splice(i, 1);
      }
      
      // Enemy Missiles
      for (let i = enemyMissiles.length - 1; i >= 0; i--) {
        const m = enemyMissiles[i];
        
        const angleToPlayer = Math.atan2(player.y - m.y, player.x - m.x);
        const currentAngle = Math.atan2(m.vy, m.vx);
        let diff = angleToPlayer - currentAngle;
        while (diff > Math.PI) diff -= 2 * Math.PI;
        while (diff < -Math.PI) diff += 2 * Math.PI;
        
        const newAngle = currentAngle + diff * 0.06;
        const speed = Math.hypot(m.vx, m.vy);
        
        m.vx = Math.cos(newAngle) * speed;
        m.vy = Math.sin(newAngle) * speed;
        
        m.x += m.vx;
        m.y += m.vy;
        m.life--;
        
        m.trail.push({ x: m.x, y: m.y, life: 15 });
        m.trail = m.trail.filter(t => { t.life--; return t.life > 0; });
        
        // Hit Player
        if (Math.hypot(m.x - player.x, m.y - player.y) < 20) {
          player.health -= 25;
          gameState.screenShake = 15;
          createExplosion(m.x, m.y, '#ff4757', false);
          enemyMissiles.splice(i, 1);
          if (player.health <= 0) gameOver();
          continue;
        }
        
        if (m.life <= 0) enemyMissiles.splice(i, 1);
      }
      
      // Anti-Missiles
      for (let i = antiMissiles.length - 1; i >= 0; i--) {
        const m = antiMissiles[i];
        
        if (m.target && enemyMissiles.includes(m.target)) {
           const angle = Math.atan2(m.target.y - m.y, m.target.x - m.x);
           m.x += Math.cos(angle) * m.speed;
           m.y += Math.sin(angle) * m.speed;
           
           if (Math.hypot(m.x - m.target.x, m.y - m.target.y) < 15) {
             createExplosion(m.target.x, m.target.y, '#ffffff', false);
             enemyMissiles = enemyMissiles.filter(e => e !== m.target);
             antiMissiles.splice(i, 1);
             gameState.score += 25;
             continue;
           }
        } else {
          antiMissiles.splice(i, 1);
          continue;
        }
        
        m.life--;
        if (m.life <= 0) antiMissiles.splice(i, 1);
      }
    }

    function createExplosion(x, y, color, isBig) {
      const count = isBig ? 30 : 15;
      const radius = isBig ? 60 : 30;
      explosions.push({ x, y, radius: 5, maxRadius: radius, alpha: 1, color });
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 5 + 1;
        particles.push({
          x, y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 1,
          color: color
        });
      }
    }

    function updateParticles() {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.life -= 0.04;
        if (p.life <= 0) particles.splice(i, 1);
      }
      
      for (let i = explosions.length - 1; i >= 0; i--) {
        const e = explosions[i];
        e.radius += 4;
        e.alpha -= 0.06;
        if (e.alpha <= 0) explosions.splice(i, 1);
      }

      for (let i = trails.length - 1; i >= 0; i--) {
        trails[i].life -= 0.05;
        if (trails[i].life <= 0) trails.splice(i, 1);
      }
    }

    function updateCamera() {
      const targetX = player.x - canvas.width / 2;
      const targetY = player.y - canvas.height / 2;
      camera.x += (targetX - camera.x) * 0.1;
      camera.y += (targetY - camera.y) * 0.1;
      
      if (gameState.screenShake > 0) {
        camera.x += (Math.random() - 0.5) * gameState.screenShake;
        camera.y += (Math.random() - 0.5) * gameState.screenShake;
        gameState.screenShake -= 0.8;
      }
    }

    /* -- RENDERING -- */

    function drawBackground() {
      const grd = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 0, canvas.width/2, canvas.height/2, canvas.width);
      grd.addColorStop(0, '#0d1525');
      grd.addColorStop(1, '#050a10');
      ctx.fillStyle = grd;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      ctx.strokeStyle = 'rgba(0, 245, 212, 0.05)';
      ctx.lineWidth = 1;
      const gridSize = 100;
      const startX = Math.floor(camera.x / gridSize) * gridSize;
      const startY = Math.floor(camera.y / gridSize) * gridSize;
      
      ctx.beginPath();
      for (let x = startX; x < camera.x + canvas.width + gridSize; x += gridSize) {
        ctx.moveTo(x - camera.x, 0);
        ctx.lineTo(x - camera.x, canvas.height);
      }
      for (let y = startY; y < camera.y + canvas.height + gridSize; y += gridSize) {
        ctx.moveTo(0, y - camera.y);
        ctx.lineTo(canvas.width, y - camera.y);
      }
      ctx.stroke();
    }

    function drawJet() {
      ctx.save();
      const sx = player.x - camera.x;
      const sy = player.y - camera.y;
      
      // Draw Trail
      ctx.globalAlpha = 0.6;
      trails.forEach(t => {
        ctx.fillStyle = t.color; 
        ctx.globalAlpha = t.life * 0.6;
        ctx.beginPath();
        ctx.arc(t.x - camera.x, t.y - camera.y, 3 * t.life, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.globalAlpha = 1;

      ctx.translate(sx, sy);
      ctx.rotate(player.angle);
      
      // Glow
      const glow = ctx.createRadialGradient(0, 0, 0, 0, 0, 50);
      glow.addColorStop(0, 'rgba(0, 245, 212, 0.3)');
      glow.addColorStop(1, 'rgba(0, 245, 212, 0)');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(0, 0, 50, 0, Math.PI * 2);
      ctx.fill();
      
      // Jet Body
      ctx.fillStyle = '#e8edf5';
      ctx.beginPath();
      ctx.moveTo(30, 0); // Nose
      ctx.lineTo(-18, -18); // Left Wing
      ctx.lineTo(-10, 0);
      ctx.lineTo(-18, 18); // Right Wing
      ctx.closePath();
      ctx.fill();
      
      // Cockpit
      ctx.fillStyle = '#00f5d4';
      ctx.beginPath();
      ctx.ellipse(5, 0, 10, 6, 0, 0, Math.PI * 2);
      ctx.fill();
      
      // Engine Burn
      if (player.speed > 0.5) {
        const flicker = Math.random() * 8;
        ctx.fillStyle = keys.w ? '#ff4757' : '#ffa502';
        ctx.beginPath();
        ctx.moveTo(-18, -6);
        ctx.lineTo(-30 - (keys.w ? 15 : 0) - flicker, 0);
        ctx.lineTo(-18, 6);
        ctx.closePath();
        ctx.fill();
      }
      
      ctx.restore();
    }

    function drawEnemies() {
      enemies.forEach(en => {
        const sx = en.x - camera.x;
        const sy = en.y - camera.y;
        
        ctx.strokeStyle = 'rgba(255, 71, 87, 0.1)';
        ctx.beginPath();
        ctx.arc(sx, sy, 250, 0, Math.PI * 2);
        ctx.stroke();
        
        ctx.save();
        ctx.translate(sx, sy);
        ctx.rotate(en.angle);
        
        ctx.fillStyle = '#ff4757';
        ctx.fillRect(-15, -12, 30, 24);
        ctx.fillStyle = '#2f3542';
        ctx.fillRect(5, -4, 20, 8);
        
        ctx.restore();
      });
    }

    function drawProjectiles() {
      // Player Missiles
      ctx.strokeStyle = '#00f5d4';
      ctx.lineWidth = 2;
      playerMissiles.forEach(m => {
        const sx = m.x - camera.x;
        const sy = m.y - camera.y;
        ctx.beginPath();
        m.trail.forEach(t => ctx.lineTo(t.x - camera.x, t.y - camera.y));
        ctx.stroke();
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(sx, sy, 3, 0, Math.PI * 2);
        ctx.fill();
      });
      
      // Enemy Missiles
      ctx.strokeStyle = '#ff4757';
      ctx.lineWidth = 2;
      enemyMissiles.forEach(m => {
        const sx = m.x - camera.x;
        const sy = m.y - camera.y;
        ctx.beginPath();
        m.trail.forEach(t => ctx.lineTo(t.x - camera.x, t.y - camera.y));
        ctx.stroke();
        ctx.fillStyle = '#ff4757';
        ctx.beginPath();
        ctx.arc(sx, sy, 4, 0, Math.PI * 2);
        ctx.fill();
      });
      
      // Anti-Missiles
      ctx.fillStyle = '#ffffff';
      antiMissiles.forEach(m => {
        ctx.beginPath();
        ctx.arc(m.x - camera.x, m.y - camera.y, 3, 0, Math.PI * 2);
        ctx.fill();
      });
    }

    function drawParticles() {
      particles.forEach(p => {
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.life;
        ctx.beginPath();
        ctx.arc(p.x - camera.x, p.y - camera.y, 3, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.globalAlpha = 1;
      
      explosions.forEach(e => {
        ctx.strokeStyle = e.color;
        ctx.lineWidth = 3;
        ctx.globalAlpha = e.alpha;
        ctx.beginPath();
        ctx.arc(e.x - camera.x, e.y - camera.y, e.radius, 0, Math.PI * 2);
        ctx.stroke();
      });
      ctx.globalAlpha = 1;
    }

    function drawMinimap() {
      const scale = 150 / MAP_SIZE;
      
      minimapCtx.fillStyle = 'rgba(5, 10, 16, 0.8)';
      minimapCtx.fillRect(0, 0, 150, 150);
      
      minimapCtx.fillStyle = '#ff4757';
      enemies.forEach(en => {
        minimapCtx.beginPath();
        minimapCtx.arc(en.x * scale, en.y * scale, 3, 0, Math.PI * 2);
        minimapCtx.fill();
      });
      
      minimapCtx.fillStyle = '#ffa502';
      enemyMissiles.forEach(m => {
        minimapCtx.beginPath();
        minimapCtx.arc(m.x * scale, m.y * scale, 2, 0, Math.PI * 2);
        minimapCtx.fill();
      });
      
      minimapCtx.save();
      minimapCtx.translate(player.x * scale, player.y * scale);
      minimapCtx.rotate(player.angle);
      minimapCtx.fillStyle = '#00f5d4';
      minimapCtx.beginPath();
      minimapCtx.moveTo(6, 0);
      minimapCtx.lineTo(-3, -3);
      minimapCtx.lineTo(-3, 3);
      minimapCtx.closePath();
      minimapCtx.fill();
      minimapCtx.restore();
    }
    
    function drawCrosshair() {
      const mx = gameState.mouse.x;
      const my = gameState.mouse.y;
      
      ctx.strokeStyle = 'rgba(0, 245, 212, 0.6)';
      ctx.lineWidth = 1;
      
      ctx.beginPath();
      ctx.moveTo(mx - 15, my);
      ctx.lineTo(mx - 5, my);
      ctx.moveTo(mx + 5, my);
      ctx.lineTo(mx + 15, my);
      ctx.moveTo(mx, my - 15);
      ctx.lineTo(mx, my - 5);
      ctx.moveTo(mx, my + 5);
      ctx.lineTo(mx, my + 15);
      ctx.stroke();
      
      ctx.beginPath();
      ctx.arc(mx, my, 20, 0, Math.PI * 2);
      ctx.stroke();
    }

    /* -- MAIN LOOP -- */
    function loop(timestamp) {
      const dt = Math.min((timestamp - gameState.lastTime) / 1000, 0.1);
      gameState.lastTime = timestamp;
      
      if (gameState.running) {
        updatePlayer(dt);
        updateEnemies(dt);
        updateProjectiles(dt);
        updateParticles();
        updateCamera();
        updateHUD();
        
        if (enemies.length === 0) {
          spawnWave();
          player.counterMeasures = Math.min(player.counterMeasures + 3, 10);
        }
      }
      
      drawBackground();
      drawEnemies();
      drawProjectiles();
      drawParticles();
      drawJet();
      drawMinimap();
      if(gameState.running) drawCrosshair();
      
      requestAnimationFrame(loop);
    }

    /* -- EVENT LISTENERS -- */
    window.onload = function() {
      resize();
      window.addEventListener('resize', resize);
      
      window.addEventListener('keydown', e => {
        // IMPORTANT: Prevent default browser behavior (scrolling) for Space and Arrows
        if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) {
          e.preventDefault();
        }
        
        const key = e.key.toLowerCase();
        if (key === 'w' || key === 'arrowup') keys.w = true;
        if (key === 'a' || key === 'arrowleft') keys.a = true;
        if (key === 's' || key === 'arrowdown') keys.s = true;
        if (key === 'd' || key === 'arrowright') keys.d = true;
        if (key === ' ') keys.space = true;
        if (key === 'e') keys.e = true;
      });
      
      window.addEventListener('keyup', e => {
        const key = e.key.toLowerCase();
        if (key === 'w' || key === 'arrowup') keys.w = false;
        if (key === 'a' || key === 'arrowleft') keys.a = false;
        if (key === 's' || key === 'arrowdown') keys.s = false;
        if (key === 'd' || key === 'arrowright') keys.d = false;
        if (key === ' ') keys.space = false;
        if (key === 'e') keys.e = false;
      });
      
      window.addEventListener('mousemove', e => {
        gameState.mouse.x = e.clientX;
        gameState.mouse.y = e.clientY;
      });
      
      startBtn.addEventListener('click', startGame);
      restartBtn.addEventListener('click', startGame);
      
      requestAnimationFrame(loop);
    };
  </script>
</body>
